<header class="bg-zinc-900/80 backdrop-blur-md border-b border-zinc-800 px-6 py-3 flex justify-between items-center z-50 sticky top-0">
  <div class="flex items-center gap-2 cursor-pointer" routerLink="/">
    <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
      <span class="text-white font-black text-sm">T</span>
    </div>
    <span class="text-white font-bold text-lg tracking-tight">TaskTrack</span>
  </div>

  <div class="flex items-center gap-5">
    
    <div class="hidden sm:flex items-center gap-2 bg-zinc-800 border border-zinc-700 px-3 py-1 rounded-full">
      <div class="w-1.5 h-1.5 rounded-full bg-indigo-500 shadow-[0_0_8px_rgba(99,102,241,0.6)]"></div>
      <span class="text-[10px] font-black text-zinc-300 uppercase tracking-widest">
        {{ currentRole }}
      </span>
    </div>

    <div class="flex items-center gap-3 border-l border-zinc-800 pl-5">
      <button class="text-zinc-500 hover:text-white transition-colors relative">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
        </svg>
        <span class="absolute -top-1 -right-1 w-2 h-2 bg-indigo-500 rounded-full border-2 border-zinc-900"></span>
      </button>

      <div class="relative">
        <button (click)="toggleMenu()" class="flex items-center gap-2 group">
          <div class="w-8 h-8 bg-zinc-800 border border-zinc-700 rounded-full flex items-center justify-center group-hover:border-indigo-500/50 transition-all">
            <svg class="w-4 h-4 text-zinc-400 group-hover:text-white" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path>
            </svg>
          </div>
        </button>

        <div *ngIf="isMenuOpen" 
             class="absolute right-0 mt-3 w-40 bg-zinc-900 border border-zinc-800 rounded-xl shadow-2xl py-2 z-50">
          <button (click)="onLogout()" 
                  class="w-full text-left px-4 py-2 text-xs font-bold text-red-400 hover:bg-red-500/10 transition-colors">
            LOGOUT
          </button>
        </div>
      </div>
    </div>
  </div>
</header>
