<div class="min-h-screen flex items-center justify-center bg-zinc-950 px-4 relative">
  <div class="absolute w-64 h-64 bg-indigo-600/10 rounded-full blur-[100px]"></div>

  <div class="w-full max-w-sm z-10">
    <div class="bg-zinc-900/80 backdrop-blur-md border border-zinc-800 p-6 rounded-2xl shadow-2xl">
      <div class="text-center mb-6">
        <h2 class="text-2xl font-bold text-white tracking-tight">Register</h2>
        <p class="text-zinc-500 text-xs mt-1">Join the TaskTrack platform</p>
      </div>

      <form [formGroup]="signupForm" (ngSubmit)="onSignup()" class="space-y-3.5">
        <div>
          <label class="block text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-1 ml-1">Username</label>
          <input type="text" formControlName="userName" 
                 class="w-full bg-zinc-800/40 border border-zinc-700/50 rounded-xl px-4 py-2.5 text-sm text-white focus:ring-2 focus:ring-indigo-500/50 outline-none">
        </div>

        <div>
          <label class="block text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-1 ml-1">Email</label>
          <input type="email" formControlName="email" 
                 class="w-full bg-zinc-800/40 border border-zinc-700/50 rounded-xl px-4 py-2.5 text-sm text-white focus:ring-2 focus:ring-indigo-500/50 outline-none">
        </div>

        <div>
          <label class="block text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-1 ml-1">Password</label>
          <input type="password" formControlName="password" 
                 class="w-full bg-zinc-800/40 border border-zinc-700/50 rounded-xl px-4 py-2.5 text-sm text-white focus:ring-2 focus:ring-indigo-500/50 outline-none">
        </div>

        <div>
          <label class="block text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-1 ml-1">Department</label>
          <select formControlName="department" 
                  class="w-full bg-zinc-800/40 border border-zinc-700/50 rounded-xl px-4 py-2.5 text-sm text-white focus:ring-2 focus:ring-indigo-500/50 outline-none appearance-none cursor-pointer">
            <option value="" disabled selected class="bg-zinc-900">Select Dept</option>
            <option *ngFor="let dept of departmentOptions" [value]="dept" class="bg-zinc-900">{{dept}}</option>
          </select>
        </div>

        <button type="submit" [disabled]="signupForm.invalid"
                class="w-full bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-bold py-2.5 rounded-xl transition-all active:scale-95 disabled:opacity-50">
          Sign Up
        </button>
      </form>

      <div class="mt-6 text-center text-xs">
        <span class="text-zinc-500">Already a member?</span>
        <a routerLink="/login" class="text-indigo-400 font-bold ml-1 hover:text-indigo-300">Log In</a>
      </div>
    </div>
  </div>
</div>
